<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Login</title>
    <link href="assets/img/icon.jpg" rel="icon">
    <link rel="stylesheet" href="assets/css/Final.css">
    
    
</head>
<body style="background-image: url('assets/img/Lbg2.jpg');">

<!-- Your Content Goes Here -->
<header class="header">
  <div class="logo">
      <img src="assets/img/icon.jpg" alt="FitLife Logo">
  </div>
  <div class="header-left">FitLife</div>
  <ul class="nav-links">
      <li><a href="Index.html">Home</a></li>
      <li><a href="About_us.html">About Us</a></li>
      <li><a href="Login.html">Login</a></li>
  </ul>
</header>

<div class="auth-container">
<div class="login-box">
    <h2>User Login</h2>
    <form id="loginForm" action="Login.php" method="POST">
        <div class="input-box">
            <input type="email" name="email" id="email" placeholder="Enter your email" required>
            <span class="error" id="emailError"></span>
        </div>
        <div class="input-box">
            <input type="password" name="password" id="password" placeholder="Enter your password" required>
            <span class="error" id="passwordError"></span>
        </div>
        <input type="submit" value="Login">
    </form>
    <br>
    <h3 style="font-family:'Times New Roman', Times, serif;">Don't have an account?</h3><br>
    <a href="Register.html">Register</a>
</div>
</div>


<script>
    // JavaScript to display error messages
    document.addEventListener("DOMContentLoaded", function () {
        const urlParams = new URLSearchParams(window.location.search);
        document.getElementById("emailError").textContent = urlParams.get("emailError") || "";
        document.getElementById("passwordError").textContent = urlParams.get("passwordError") || "";
    });
</script>

</body>
</html>
