<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outdoor Exercises</title>
    <link rel="stylesheet" href="assets/css/Exercise.css"> <!-- External CSS -->
    <script src="assets/Scripts/scriptOE.js"></script> <!-- External JS -->

    <!-- Favicons -->
    <link href="assets/img/icon.jpg" rel="icon">


    <style>
        /* General Styling */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
            color: #ffffff;
        }

        body {
            background-color: #1a1a1a;
        }
     
        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #333;
            padding: 5px 10px;
            color: white;
            position: fixed;
            width: 100%;
            top: 0;
            left: 0;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            z-index: 1000;
        }

        /* Profile Icon */
        .profile-icon {
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: white url('assets/img/profile-icon.png') center/cover; /* Replace with actual profile image */
        }

        /* Slide Menu */
        .slide-menu {
            position: fixed;
            top: 0;
            left: -250px; /* Hidden by default */
            width: 250px;
            height: 100vh;
            background: #222;
            padding-top: 60px;
            transition: 0.3s ease-in-out;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            z-index: 1100; /* Add this */
        }

        .menu-items {
            flex-grow: 1; /* Push settings & unregister to the bottom */
        }

        .slide-menu a {
            display: block;
            padding: 15px 20px;
            color: white;
            text-decoration: none;
            font-size: 18px;
            transition: 0.3s;
        }

        .slide-menu a:hover {
            background: #444;
        }

        /* Close Button */
        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 24px;
            cursor: pointer;
            color: white;
        }

        /* Open Menu Class */
        .slide-menu.open {
            left: 0;
        }

        /* Bottom Items */
        .bottom-links {
            border-top: 1px solid #444;
            padding: 10px 0;
        }

        .bottom-links a {
            color: red; /* Highlight "Unregister" */
            font-weight: bold;
        }

        .bottom-links a.settings {
            color: white; /* Normal color for settings */
        }
    </style>



</head>
<body>

    <!-- Header -->
    <div class="header">
        <div class="profile-icon" onclick="toggleMenu()"></div> <!-- Profile Icon (Toggle Slide Menu) -->
        <h2>Home Exercise</h2>
    </div>

    <!-- Slide Menu -->
    <div class="slide-menu" id="menu">
        <span class="close-btn" onclick="toggleMenu()">✖</span>
        
        <div class="menu-items">
            <a href="#">Profile & Edit</a>
            <a href="Index.html">Home</a>
            <a href="About_us.html">About Us</a>
            <a href="Dashboard.html">Dashboard</a>
            <a href="#">Enter Your...</a>
            <a href="#">Track Your Progress</a>
        </div>

        <div class="bottom-links">
            <a href="#" class="unregister">Unregister</a>
            <a href="#" class="settings">Settings</a>
        </div>
    </div>



    <!-- First Div: Select Exercise -->
     <div class="exercise-section">
    <div class="exercise-container">
    <div class="exercise-options">
        <h2>Choose an Exercise</h2>
        <div class="exercise-images">
            <img src="assets/img/i.jpg" class="exercise-option" data-option="option1">
            <img src="assets/img/icon.jpg" class="exercise-option" data-option="option2">
            <img src="assets/img/icon2.jpg" class="exercise-option" data-option="option3">
            <img src="assets/img/i.jpg" class="exercise-option" data-option="option4">
            <img src="assets/img/icon.jpg" class="exercise-option" data-option="option5">
        </div>
    </div>
    </div><br><br>
    </div>

    <!-- Grey Line -->
    <hr><br><br>

    <!-- Second Div: Video Section -->
    <div id="video-section">
        <h2>Exercise Videos</h2>
        <p id="default-message">Select your option and let's begin !!</p>
        <div id="video-container"></div> <!-- Videos appear here -->
    </div><br><br>
    
    

</body>
</html>
