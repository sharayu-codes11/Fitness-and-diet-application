        body {
            background-image: url('assets/img/Lbg2.jpg');

        /* Profile Icon */
        .profile-icon {
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: white url('assets/img/profile_icon.jpg') center/cover; /* Replace with actual profile image */

        /* Close Button */
        .close-btn {
            position: absolute;

        .sidebar {

            right: -200px; /* Initially hidden */
            padding-top: 60px;
            overflow-y: auto;

            z-index: 1000;
        }
        .sidebar ul {
            list-style: none;
            padding: 0;
        }
        .sidebar ul li {
            color: white;
            cursor: pointer;
            padding: 15px;
        }
        .sidebar ul li a {
            color: white;
            text-decoration: none;
        }

</head>

            <p id="default-message" style="color:white;">Select your option and let's begin !!</p>
            <div id="video-container"></div>
        </div>
    </div><br><br>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
    let sidebar = document.querySelector(".sidebar");
    let profileIcon = document.querySelector(".profile-icon");

    // Function to toggle the sidebar visibility
    function toggleMenu() {
        if (sidebar.style.right === "0px") {
            sidebar.style.right = "-200px"; // Hide Sidebar
        } else {
            sidebar.style.right = "0px"; // Show Sidebar
        }
    }

    // Add click event to the profile icon to open the sidebar
    profileIcon.addEventListener("click", toggleMenu);
});

    </script>
